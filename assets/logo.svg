<svg width="680" height="680" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SchoolFaceID Logo</title>
<desc>Logo tech minimalista con occhio centrato e elementi di riconoscimento facciale</desc>
<defs>
  <style>
    .bg { fill: #070d1a; }
    .ring { fill: none; stroke: #3b82f6; }
    .ring-dim { fill: none; stroke: #1e3a5f; }
    .dot { fill: #3b82f6; }
    .scan { fill: none; stroke: #22c55e; stroke-width: 1.5; }
    .eye-fill { fill: #0e1829; }
    .iris { fill: #3b82f6; }
    .pupil { fill: #070d1a; }
    .glint { fill: #f0f6ff; }
    .corner { fill: none; stroke: #3b82f6; stroke-width: 2.5; stroke-linecap: round; }
    .corner-dim { fill: none; stroke: #1e3a5f; stroke-width: 1.5; stroke-linecap: round; }
    .label-main { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; fill: #f0f6ff; letter-spacing: 2px; }
    .label-sub { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 400; fill: #3b82f6; letter-spacing: 4px; }
    .tick { fill: none; stroke: #3b82f6; stroke-width: 1; }
    .grid-line { stroke: #1e3a5f; stroke-width: 0.5; fill: none; }
  </style>
</defs>

